services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/London
    volumes:
      - /Docker/calibre-web/config:/config
      - /nas/E-Books:/books
    ports:
      - 8083:8083
    restart: unless-stopped
